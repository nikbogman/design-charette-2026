<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Answers</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 640px;
      margin: 80px auto;
      padding: 0 16px;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }

    ul {
      padding-left: 0;
      list-style: none;
    }

    li {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      margin-bottom: 0.6rem;
      line-height: 1.5;
    }

    li .content {
      flex: 1;
    }

    li img {
      display: block;
      max-width: 100%;
      border: 1px solid #ccc;
      border-radius: 4px;
      margin-top: 4px;
    }

    .btn-delete {
      flex-shrink: 0;
      background: none;
      border: 1px solid #ccc;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
      padding: 2px 6px;
      color: #999;
      line-height: 1.5;
    }

    .btn-delete:hover {
      border-color: #e55;
      color: #e55;
    }

    .btn-clear {
      margin-bottom: 1rem;
      background: none;
      border: 1px solid #ccc;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 4px 10px;
      color: #666;
    }

    .btn-clear:hover {
      border-color: #e55;
      color: #e55;
    }

    a {
      display: inline-block;
      margin-top: 1.5rem;
      color: #1a1a1a;
    }
  </style>
</head>

<body>
  <h1>Submitted Answers</h1>
  <button class="btn-clear" onclick="clearAll()">Clear all</button>
  <ul id="list">
    <li>Loading...</li>
  </ul>
  <a href="/input">Back to question</a>

  <script>
    const list = document.getElementById("list");
    let lastDate = new Date().toISOString();

    function escapeHtml(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    function renderAnswer(a) {
      const at = encodeURIComponent(a.submittedAt);
      const body = a.type === "drawing"
        ? `<img src="/drawings/${a.key}" alt="drawing" />`
        : escapeHtml(a.value);
      return `<li data-at="${at}"><span class="content">${body}</span><button class="btn-delete" onclick="deleteAnswer('${at}')" aria-label="Delete">&#128465;</button></li>`;
    }

    async function deleteAnswer(encodedAt) {
      const res = await fetch(`/answers/${encodedAt}`, { method: "DELETE" });
      if (res.ok) document.querySelector(`[data-at="${encodedAt}"]`)?.remove();
    }

    async function clearAll() {
      const answers = await fetch("/answers").then((r) => r.json());
      await Promise.all(answers.map((a) => deleteAnswer(encodeURIComponent(a.submittedAt))));
      if (!list.children.length) list.innerHTML = "<li>No answers yet.</li>";
    }

    async function init() {
      const answers = await fetch("/answers").then((r) => r.json());
      list.innerHTML = answers.length ? answers.map(renderAnswer).join("") : "<li>No answers yet.</li>";
      if (answers.length) lastDate = answers.at(-1).submittedAt;
    }

    async function poll() {
      const answers = await fetch("/answers").then((r) => r.json());
      const fresh = answers.filter((a) => a.submittedAt > lastDate);
      if (!fresh.length) return;
      const hadPlaceholder = list.querySelector("li:only-child")?.textContent === "No answers yet.";
      if (hadPlaceholder) list.innerHTML = "";
      fresh.forEach((a) => list.insertAdjacentHTML("beforeend", renderAnswer(a)));
      lastDate = fresh.at(-1).submittedAt;
    }

    init();
    setInterval(poll, 1000);
  </script>
</body>

</html>
