<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Answers</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 640px;
      margin: 80px auto;
      padding: 0 16px;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }

    ul {
      padding-left: 1.2rem;
    }

    li {
      margin-bottom: 0.6rem;
      line-height: 1.5;
    }

    li img {
      display: block;
      max-width: 100%;
      border: 1px solid #ccc;
      border-radius: 4px;
      margin-top: 4px;
    }

    a {
      display: inline-block;
      margin-top: 1.5rem;
      color: #1a1a1a;
    }
  </style>
</head>

<body>
  <h1>Submitted Answers</h1>
  <ul id="list">
    <li>Loading...</li>
  </ul>
  <a href="/input">Back to question</a>

  <script>
    const list = document.getElementById("list");
    let lastDate = new Date().toISOString();

    function escapeHtml(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    function renderAnswer(a) {
      return a.type === "drawing"
        ? `<li><img src="/drawings/${a.key}" alt="drawing" /></li>`
        : `<li>${escapeHtml(a.value)}</li>`;
    }

    async function init() {
      const answers = await fetch("/answers").then((r) => r.json());
      list.innerHTML = answers.length ? answers.map(renderAnswer).join("") : "<li>No answers yet.</li>";
      if (answers.length) lastDate = answers.at(-1).submittedAt;
    }

    async function poll() {
      const answers = await fetch("/answers").then((r) => r.json());
      const fresh = answers.filter((a) => a.submittedAt > lastDate);
      if (!fresh.length) return;
      fresh.forEach((a) => list.insertAdjacentHTML("beforeend", renderAnswer(a)));
      lastDate = fresh.at(-1).submittedAt;
    }

    init();
    setInterval(poll, 1000);
  </script>
</body>

</html>
