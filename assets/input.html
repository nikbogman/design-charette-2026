<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design Charrette</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 640px;
      margin: 80px auto;
      padding: 0 16px;
    }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; }
    textarea {
      width: 100%;
      height: 140px;
      padding: 10px;
      font-size: 1rem;
      box-sizing: border-box;
      resize: vertical;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    #canvas {
      display: none;
      width: 100%;
      height: 280px;
      border: 1px solid #ccc;
      border-radius: 4px;
      cursor: crosshair;
      touch-action: none;
    }
    .toolbar {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    button {
      padding: 8px 20px;
      font-size: 1rem;
      cursor: pointer;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 4px;
    }
    button:hover { background: #333; }
    #toggle-btn.active { background: #b91c1c; }
  </style>
</head>
<body>
  <h1>What is your design idea for this project?</h1>
  <form id="form">
    <textarea id="answer" name="answer" placeholder="Type your answer here..."></textarea>
    <canvas id="canvas"></canvas>
    <div class="toolbar">
      <button type="button" id="toggle-btn">Draw</button>
      <button type="button" id="clear-btn" style="display:none">Clear</button>
      <button type="submit">Send</button>
    </div>
  </form>

  <script>
    const textarea = document.getElementById("answer");
    const canvas   = document.getElementById("canvas");
    const toggleBtn = document.getElementById("toggle-btn");
    const clearBtn  = document.getElementById("clear-btn");
    const ctx = canvas.getContext("2d");
    let drawing = false;
    let drawMode = false;

    // --- resize canvas to its CSS size (called every time draw mode opens) ---
    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      canvas.width  = rect.width;
      canvas.height = rect.height;
      // styles are reset when dimensions change — reapply
      ctx.strokeStyle = "#dc2626";
      ctx.lineWidth   = 3;
      ctx.lineCap     = "round";
      ctx.lineJoin    = "round";
    }

    // --- toggle between text and draw ---
    toggleBtn.addEventListener("click", () => {
      drawMode = !drawMode;
      textarea.style.display  = drawMode ? "none" : "";
      canvas.style.display    = drawMode ? "block" : "none";
      clearBtn.style.display  = drawMode ? "" : "none";
      toggleBtn.textContent   = drawMode ? "Text" : "Draw";
      toggleBtn.classList.toggle("active", drawMode);
      if (drawMode) resizeCanvas();
    });

    clearBtn.addEventListener("click", () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = "#dc2626";
      ctx.lineWidth   = 3;
      ctx.lineCap     = "round";
      ctx.lineJoin    = "round";
    });

    // --- pointer helpers (works for mouse and touch) ---
    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const src  = e.touches ? e.touches[0] : e;
      return {
        x: src.clientX - rect.left,
        y: src.clientY - rect.top,
      };
    }

    function startDraw(e) {
      e.preventDefault();
      drawing = true;
      const { x, y } = getPos(e);
      ctx.beginPath();
      ctx.moveTo(x, y);
    }

    function moveDraw(e) {
      e.preventDefault();
      if (!drawing) return;
      const { x, y } = getPos(e);
      ctx.lineTo(x, y);
      ctx.stroke();
    }

    function stopDraw() { drawing = false; }

    canvas.addEventListener("mousedown",  startDraw);
    canvas.addEventListener("mousemove",  moveDraw);
    canvas.addEventListener("mouseup",    stopDraw);
    canvas.addEventListener("mouseleave", stopDraw);
    canvas.addEventListener("touchstart", startDraw, { passive: false });
    canvas.addEventListener("touchmove",  moveDraw,  { passive: false });
    canvas.addEventListener("touchend",   stopDraw);

    // --- submit: send text or canvas PNG as a File ---
    document.getElementById("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const body = new FormData();
      if (drawMode) {
        const blob = await new Promise((res) => canvas.toBlob(res, "image/png"));
        if (!blob) return;
        body.append("answer", new File([blob], "drawing.png", { type: "image/png" }));
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      } else {
        const text = textarea.value.trim();
        if (!text) return;
        body.append("answer", text);
        textarea.value = "";
        textarea.focus();
      }
      await fetch("/submit", { method: "POST", body });
    });
  </script>
</body>
</html>
