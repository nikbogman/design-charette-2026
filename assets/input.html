<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design Charrette</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
    }

    body {
      background: #040d1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      overflow: auto;
    }

    .panel {
      position: relative;
      width: min(1100px, 96vw);
      background: url('bg_input.png') center / 100% 100% no-repeat;
      padding: 64px 88px 56px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .question-nav {
      display: flex;
      align-items: center;
      gap: 16px;
      padding-top: 24px;
    }

    .question-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .category {
      color: #4a9ab5;
      font-size: 0.8rem;
      text-align: center;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .question {
      color: #7ee8ff;
      font-size: 2.4rem;
      font-weight: 400;
      text-align: center;
      letter-spacing: 0.03em;
      text-shadow: 0 0 12px rgba(100, 220, 255, 0.5);
    }

    .hint {
      color: #4a9ab5;
      font-size: 1.2rem;
      text-align: center;
      letter-spacing: 0.05em;
    }

    .nav-btn {
      flex-shrink: 0;
      width: 48px;
      height: 48px;
      background: transparent;
      border: 1.5px solid rgba(0, 207, 255, 0.4);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .nav-btn:hover {
      background: rgba(0, 207, 255, 0.08);
      border-color: rgba(0, 207, 255, 0.9);
    }

    .nav-btn:active { background: rgba(0, 207, 255, 0.18); }

    .nav-btn:disabled {
      opacity: 0.2;
      cursor: default;
      pointer-events: none;
    }

    canvas {
      width: 100%;
      height: 320px;
      background: rgba(10, 60, 90, 0.25);
      cursor: crosshair;
      touch-action: none;
      display: block;
      border-radius: 48px;
      box-shadow: inset 0 0 80px rgba(0, 207, 255, 0.12);
      border: 2px dashed rgba(0, 207, 255, 1);
    }

    .info-panel {
      width: 100%;
      height: 80px;
      background: rgba(10, 60, 90, 0.12);
      border-radius: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding-left: 28px;
    }

    .panel-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: transparent;
      border: 1.5px solid rgba(0, 207, 255, 0.5);
      color: #7ee8ff;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      padding: 8px 20px;
      cursor: pointer;
      border-radius: 8px;
      text-shadow: 0 0 8px rgba(0, 207, 255, 0.5);
      transition: background 0.15s, border-color 0.15s;
    }
    .panel-btn:hover {
      background: rgba(0, 207, 255, 0.08);
      border-color: rgba(0, 207, 255, 0.9);
    }
    .panel-btn:active { background: rgba(0, 207, 255, 0.18); }
    .panel-btn svg { flex-shrink: 0; }

    .info-launch-btn {
      margin-left: auto;
    }

    textarea {
      width: 100%;
      height: 320px;
      background: rgba(10, 60, 90, 0.25);
      border: 2px dashed rgba(0, 207, 255, 1);
      border-radius: 48px;
      outline: none;
      resize: none;
      color: #7ee8ff;
      font-size: 1rem;
      font-family: inherit;
      padding: 32px 40px;
      display: none;
      box-shadow: inset 0 0 80px rgba(0, 207, 255, 0.12);
      caret-color: #00cfff;
    }

    textarea::placeholder {
      color: rgba(0, 207, 255, 0.3);
    }

    .stroke-picker {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(4, 18, 40, 0.6);
      border: 1.5px solid #1a5f7a;
      border-radius: 999px;
      padding: 8px 18px;
    }

    .stroke-dot {
      background: #4a9ab5;
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    .stroke-dot:hover {
      background: #00cfff;
      transform: scale(1.15);
    }

    .stroke-dot.active {
      background: #00cfff;
      box-shadow: 0 0 8px rgba(0, 207, 255, 0.7);
    }

    .thanks-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 48px 0 32px;
      overflow: hidden;
      position: relative;
      min-height: 420px;
    }

    .thanks-screen.visible {
      display: flex;
    }

    .thanks-text {
      color: #7ee8ff;
      font-size: 2.2rem;
      font-weight: 400;
      text-align: center;
      letter-spacing: 0.04em;
      text-shadow: 0 0 18px rgba(100, 220, 255, 0.6);
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.6s ease 0.3s, transform 0.6s ease 0.3s;
    }

    .thanks-screen.visible .thanks-text {
      opacity: 1;
      transform: translateY(0);
    }

    .rocket-track {
      position: absolute;
      left: 50%;
      bottom: -80px;
      transform: translateX(-50%);
      animation: rocketFly 1.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.1s forwards;
    }

    @keyframes rocketFly {
      0%   { bottom: -80px; opacity: 1; }
      80%  { opacity: 1; }
      100% { bottom: 110%; opacity: 0; }
    }

    .rocket-flame {
      animation: flicker 0.12s infinite alternate;
      transform-origin: top center;
    }

    @keyframes flicker {
      from { transform: scaleY(1) scaleX(1); opacity: 1; }
      to   { transform: scaleY(0.8) scaleX(0.85); opacity: 0.75; }
    }
  </style>
</head>

<body>
  <div class="panel">
    <div class="question-nav" id="question-nav">
      <button class="nav-btn" id="prev-btn" aria-label="Previous question">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M15 18L9 12L15 6" stroke="#7ee8ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="question-area">
        <p class="category" id="category-text"></p>
        <p class="question" id="question-text"></p>
        <p class="hint" id="hint-text"></p>
      </div>
      <button class="nav-btn" id="next-btn" aria-label="Next question">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M9 18L15 12L9 6" stroke="#7ee8ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <canvas id="canvas"></canvas>
    <textarea id="textarea" placeholder="Type your answer here..."></textarea>
    <div class="info-panel">
      <button class="panel-btn" id="info-toggle-btn">
        <svg id="info-toggle-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="2" width="14" height="2" rx="1" fill="#7ee8ff"/>
          <rect x="1" y="7" width="10" height="2" rx="1" fill="#7ee8ff"/>
          <rect x="1" y="12" width="12" height="2" rx="1" fill="#7ee8ff"/>
        </svg>
        <span id="info-toggle-label">TEXT</span>
      </button>
      <button class="panel-btn" id="info-clear-btn">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 4H14" stroke="#7ee8ff" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M5 4V3C5 2.44772 5.44772 2 6 2H10C10.5523 2 11 2.44772 11 3V4" stroke="#7ee8ff" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M3.5 4L4.5 13C4.5 13.5523 4.94772 14 5.5 14H10.5C11.0523 14 11.5 13.5523 11.5 13L12.5 4" stroke="#7ee8ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M6.5 7V11" stroke="#7ee8ff" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M9.5 7V11" stroke="#7ee8ff" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        CLEAR
      </button>
      <button class="panel-btn info-launch-btn" id="info-launch-btn">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 2C9 2 13.5 4.5 13.5 9.5C13.5 11.5 12.5 13 11 14H7C5.5 13 4.5 11.5 4.5 9.5C4.5 4.5 9 2 9 2Z" stroke="#7ee8ff" stroke-width="1.5" stroke-linejoin="round" fill="none"/>
          <circle cx="9" cy="9" r="1.5" fill="#7ee8ff"/>
          <path d="M6.5 14.5L5.5 16.5" stroke="#7ee8ff" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M11.5 14.5L12.5 16.5" stroke="#7ee8ff" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        LAUNCH
      </button>
    </div>

    <div class="thanks-screen" id="thanks-screen">
      <p class="thanks-text">Thanks for your answer!</p>
      <svg class="rocket-track" width="56" height="120" viewBox="0 0 56 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- body -->
        <path d="M28 8 C28 8 42 22 42 54 L42 80 L14 80 L14 54 C14 22 28 8 28 8Z" fill="#0a3c5a" stroke="#00cfff" stroke-width="1.5"/>
        <!-- nose -->
        <path d="M28 2 L42 32 Q28 20 14 32 Z" fill="#00cfff" opacity="0.8"/>
        <!-- window -->
        <circle cx="28" cy="46" r="7" fill="none" stroke="#7ee8ff" stroke-width="1.5"/>
        <circle cx="28" cy="46" r="4" fill="rgba(0,207,255,0.25)"/>
        <!-- left fin -->
        <path d="M14 70 L4 86 L14 80 Z" fill="#0a3c5a" stroke="#00cfff" stroke-width="1.2"/>
        <!-- right fin -->
        <path d="M42 70 L52 86 L42 80 Z" fill="#0a3c5a" stroke="#00cfff" stroke-width="1.2"/>
        <!-- exhaust nozzle -->
        <rect x="22" y="80" width="12" height="6" rx="2" fill="#1a5f7a"/>
        <!-- flame -->
        <g class="rocket-flame">
          <path d="M22 86 Q24 110 28 118 Q32 110 34 86 Z" fill="url(#flameGrad)"/>
          <path d="M24 86 Q26 104 28 112 Q30 104 32 86 Z" fill="rgba(255,220,80,0.7)"/>
        </g>
        <defs>
          <linearGradient id="flameGrad" x1="28" y1="86" x2="28" y2="118" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#00cfff"/>
            <stop offset="50%" stop-color="#ff8800"/>
            <stop offset="100%" stop-color="#ffdd44" stop-opacity="0"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
  </div>

  <script>
    const QUESTIONS = [
      { category: "Past — what shaped us", text: "Draw a place from your childhood that no longer exists.", type: "visual" },
      { category: "Past — what shaped us", text: "What is a skill humans had 100 years ago that we are losing?", type: "text" },
      { category: "Past — what shaped us", text: "Draw the most important invention in human history.", type: "visual" },
      { category: "Present — where we are", text: "In one word: what does Earth need most right now?", type: "text" },
      { category: "Present — where we are", text: "Draw what your city looks like from above — what do you see?", type: "visual" },
      { category: "Present — where we are", text: "What is one thing technology has taken from nature — and one thing it has given back?", type: "text" },
      { category: "Future — what we build", text: "Draw the city of 2100.", type: "visual" },
      { category: "Future — what we build", text: "What rule would you give the crew of Spaceship Earth?", type: "text" },
      { category: "Future — what we build", text: "Draw the tree of the future — what does it look like?", type: "visual" },
    ];
    let currentQuestionIndex = 0;

    const canvas = document.getElementById("canvas");
    const textarea = document.getElementById("textarea");
    const ctx = canvas.getContext("2d");
    let drawing = false;
    let drawMode = true;

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      canvas.width = rect.width;
      canvas.height = rect.height;
      ctx.putImageData(imageData, 0, 0);
      applyStyles();
    }

    let currentLineWidth = 6;

    function applyStyles() {
      ctx.strokeStyle = "#00cfff";
      ctx.lineWidth = currentLineWidth;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
    }

    const ICON_TEXT = `<rect x="1" y="2" width="14" height="2" rx="1" fill="#7ee8ff"/><rect x="1" y="7" width="10" height="2" rx="1" fill="#7ee8ff"/><rect x="1" y="12" width="12" height="2" rx="1" fill="#7ee8ff"/>`;
    const ICON_DRAW = `<path d="M11 2.5L13.5 5L6.5 12H4V9.5L11 2.5Z" stroke="#7ee8ff" stroke-width="1.5" stroke-linejoin="round" fill="none"/><path d="M9 4.5L11.5 7" stroke="#7ee8ff" stroke-width="1.5"/>`;

    function setMode(shouldDraw) {
      drawMode = shouldDraw;
      canvas.style.display = drawMode ? "block" : "none";
      textarea.style.display = drawMode ? "none" : "block";
      document.getElementById("info-toggle-label").textContent = drawMode ? "TEXT" : "DRAW";
      document.getElementById("info-toggle-icon").innerHTML = drawMode ? ICON_TEXT : ICON_DRAW;
      if (drawMode) resizeCanvas();
      else textarea.focus();
    }

    function renderQuestion(index) {
      const q = QUESTIONS[index];
      document.getElementById("category-text").textContent = q.category;
      document.getElementById("question-text").textContent = q.text;
      document.getElementById("hint-text").textContent = q.type === "visual" ? "(Draw your answer)" : "(Type your answer)";
      document.getElementById("prev-btn").disabled = index === 0;
      document.getElementById("next-btn").disabled = index === QUESTIONS.length - 1;
      setMode(q.type === "visual");
    }

    function doToggle() { setMode(!drawMode); }

    function doClear() {
      if (drawMode) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        applyStyles();
      } else {
        textarea.value = "";
        textarea.focus();
      }
    }

    const infoToggleBtn = document.getElementById("info-toggle-btn");
    const infoClearBtn  = document.getElementById("info-clear-btn");
    infoToggleBtn.addEventListener("click", doToggle);
    infoClearBtn.addEventListener("click", doClear);

    document.getElementById("prev-btn").addEventListener("click", () => {
      if (currentQuestionIndex > 0) renderQuestion(--currentQuestionIndex);
    });
    document.getElementById("next-btn").addEventListener("click", () => {
      if (currentQuestionIndex < QUESTIONS.length - 1) renderQuestion(++currentQuestionIndex);
    });

    document.getElementById("stroke-picker")?.addEventListener("click", (e) => {
      const dot = e.target.closest(".stroke-dot");
      if (!dot) return;
      document.querySelectorAll(".stroke-dot").forEach(d => d.classList.remove("active"));
      dot.classList.add("active");
      currentLineWidth = Number(dot.dataset.size);
      applyStyles();
    });

    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const src = e.touches ? e.touches[0] : e;
      return { x: src.clientX - rect.left, y: src.clientY - rect.top };
    }

    function startDraw(e) {
      e.preventDefault();
      drawing = true;
      const { x, y } = getPos(e);
      ctx.beginPath();
      ctx.moveTo(x, y);
    }

    function moveDraw(e) {
      e.preventDefault();
      if (!drawing) return;
      const { x, y } = getPos(e);
      ctx.lineTo(x, y);
      ctx.stroke();
    }

    function stopDraw() { drawing = false; }

    canvas.addEventListener("mousedown", startDraw);
    canvas.addEventListener("mousemove", moveDraw);
    canvas.addEventListener("mouseup", stopDraw);
    canvas.addEventListener("mouseleave", stopDraw);
    canvas.addEventListener("touchstart", startDraw, { passive: false });
    canvas.addEventListener("touchmove", moveDraw, { passive: false });
    canvas.addEventListener("touchend", stopDraw);

    async function doLaunch() {
      const body = new FormData();
      if (drawMode) {
        const blob = await new Promise((res) => canvas.toBlob(res, "image/png"));
        if (!blob) return;
        body.append("answer", new File([blob], "drawing.png", { type: "image/png" }));
        await fetch("/submit", { method: "POST", body });
      } else {
        const text = textarea.value.trim();
        if (!text) return;
        body.append("answer", text);
        await fetch("/submit", { method: "POST", body });
      }

      document.getElementById("question-nav").style.display = "none";
      canvas.style.display = "none";
      textarea.style.display = "none";
      document.querySelector(".info-panel").style.display = "none";

      const thanks = document.getElementById("thanks-screen");
      thanks.classList.add("visible");

      setTimeout(() => {
        thanks.classList.remove("visible");
        document.getElementById("question-nav").style.display = "";
        document.querySelector(".info-panel").style.display = "";
        renderQuestion(currentQuestionIndex);
        if (drawMode) {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          applyStyles();
        } else {
          textarea.value = "";
        }
      }, 1800 + 2000);
    }

    document.getElementById("info-launch-btn").addEventListener("click", doLaunch);

    window.addEventListener("resize", resizeCanvas);
    renderQuestion(0);
  </script>
</body>

</html>
